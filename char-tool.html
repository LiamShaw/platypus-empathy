<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Markstrat R&D Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        background-color: #1e1e2e;
        color: #cdd6f4;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          "Helvetica Neue",
          Arial,
          sans-serif;
        margin: 0;
        padding: 40px 20px;
        display: flex;
        justify-content: center;
      }
      .card {
        background-color: #313244;
        border-radius: 12px;
        padding: 32px;
        box-shadow:
          0 20px 25px -5px rgba(0, 0, 0, 0.4),
          0 10px 10px -5px rgba(0, 0, 0, 0.2);
        width: 100%;
        max-width: 500px;
      }
      select,
      input[type="number"] {
        background-color: #181825;
        color: #cdd6f4;
        border: 1px solid #45475a;
        border-radius: 8px;
        padding: 12px;
        width: 100%;
        margin-top: 8px;
        outline: none;
        transition: border-color 0.2s ease;
      }
      select:focus,
      input[type="number"]:focus {
        border-color: #89b4fa;
      }
      label {
        font-size: 0.95rem;
        font-weight: 600;
        color: #bac2de;
        letter-spacing: 0.025em;
      }
      .result-box {
        background-color: #181825;
        border: 1px solid #45475a;
        border-radius: 8px;
        padding: 24px;
        text-align: center;
        margin-top: 32px;
      }
      .integer-result {
        font-size: 4rem;
        font-weight: 800;
        color: #a6e3a1;
        line-height: 1;
        margin: 16px 0;
        text-shadow: 0 0 20px rgba(166, 227, 161, 0.2);
      }
      .exact-result {
        color: #9399b2;
        font-size: 0.95rem;
        font-family: monospace;
      }
      /* Custom range slider styling */
      input[type="range"] {
        -webkit-appearance: none;
        width: 100%;
        background: transparent;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        height: 20px;
        width: 20px;
        border-radius: 50%;
        background: #89b4fa;
        cursor: pointer;
        margin-top: -8px;
        box-shadow: 0 0 10px rgba(137, 180, 250, 0.5);
      }
      input[type="range"]::-webkit-slider-runnable-track {
        width: 100%;
        height: 6px;
        cursor: pointer;
        background: #45475a;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2
        class="text-2xl font-bold mb-8 text-center tracking-wide"
        style="color: #89b4fa"
      >
        R&D Characteristic Converter
      </h2>

      <div class="mb-6">
        <label for="market">Market Segment</label>
        <select id="market" onchange="updateCharacteristics()">
          <option value="sonite">Sonite Market</option>
          <option value="vodite">Vodite Market</option>
        </select>
      </div>

      <div class="mb-6">
        <label for="characteristic">Physical Characteristic</label>
        <select id="characteristic" onchange="calculate()"></select>
      </div>

      <div class="mb-8">
        <label for="semanticValue">Semantic Target Value (1.0 - 7.0)</label>
        <div class="flex items-center gap-6 mt-3">
          <input
            type="range"
            id="semanticSlider"
            min="1"
            max="7"
            step="0.1"
            value="3.1"
            oninput="
              syncInput(this.value);
              calculate();
            "
          />
          <input
            type="number"
            id="semanticInput"
            min="1"
            max="7"
            step="0.1"
            value="3.1"
            class="w-24 text-center text-lg font-bold !mt-0"
            oninput="
              syncSlider(this.value);
              calculate();
            "
          />
        </div>
      </div>

      <div class="result-box">
        <div class="text-xs text-[#a6adc8] uppercase tracking-widest font-bold">
          Recommended R&D Input
        </div>
        <div id="integerResult" class="integer-result">--</div>
        <div id="exactResult" class="exact-result">
          Exact Formula Output: --
        </div>
      </div>
    </div>

    <script>
      // System Data: Markstrat Physical Ranges
      const data = {
        sonite: {
          features: { min: 5, max: 20, name: "Features (Number of)" },
          design: { min: 3, max: 10, name: "Design (Index)" },
          battery: { min: 24, max: 96, name: "Battery (Hour)" },
          display: { min: 4, max: 40, name: "Display (Inch)" },
          power: { min: 5, max: 100, name: "Power (GFlops)" },
        },
        vodite: {
          resolution: { min: 20, max: 100, name: "Resolution (L/mm)" },
          energy: { min: 10, max: 100, name: "Energy (BC/Wh)" },
          carbon: { min: 5, max: 50, name: "Carbon (Kg)" },
          connectivity: { min: 3, max: 10, name: "Connectivity (Index)" },
          apps: { min: 5, max: 100, name: "Apps (Number of)" },
        },
      };

      function updateCharacteristics() {
        const market = document.getElementById("market").value;
        const charSelect = document.getElementById("characteristic");
        charSelect.innerHTML = "";

        for (const [key, details] of Object.entries(data[market])) {
          const option = document.createElement("option");
          option.value = key;
          option.textContent = `${details.name} [Range: ${details.min} - ${details.max}]`;
          charSelect.appendChild(option);
        }
        calculate();
      }

      function syncInput(val) {
        document.getElementById("semanticInput").value = val;
      }
      function syncSlider(val) {
        document.getElementById("semanticSlider").value = val;
      }

      function calculate() {
        const market = document.getElementById("market").value;
        const charKey = document.getElementById("characteristic").value;
        const semanticVal = parseFloat(
          document.getElementById("semanticInput").value,
        );

        // Error handling for out-of-bounds inputs
        if (isNaN(semanticVal) || semanticVal < 1 || semanticVal > 7) {
          document.getElementById("integerResult").textContent = "ERR";
          document.getElementById("integerResult").style.color = "#f38ba8"; // Red error color
          document.getElementById("exactResult").textContent =
            "Value must be between 1.0 and 7.0";
          return;
        }

        document.getElementById("integerResult").style.color = "#a6e3a1"; // Reset to green

        const limits = data[market][charKey];
        const physicalRange = limits.max - limits.min;

        // The core Markstrat interpolation formula
        const exactValue = ((semanticVal - 1) / 6) * physicalRange + limits.min;
        const roundedValue = Math.round(exactValue);

        document.getElementById("integerResult").textContent = roundedValue;
        document.getElementById("exactResult").textContent =
          `Exact Formula Output: ${exactValue.toFixed(4)}`;
      }

      // Initialize the form on first load
      updateCharacteristics();
    </script>
  </body>
</html>
