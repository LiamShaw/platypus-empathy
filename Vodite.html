<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vodite Conjoint Interpolator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        background-color: #1e1e2e;
        color: #cdd6f4;
        font-family: ui-sans-serif, system-ui, sans-serif;
        padding: 40px 20px;
        display: flex;
        justify-content: center;
      }
      .card {
        background-color: #313244;
        border-radius: 12px;
        padding: 32px;
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4);
        width: 100%;
        max-width: 700px;
      }
      select,
      input[type="range"] {
        background-color: #181825;
        color: #cdd6f4;
        border: 1px solid #45475a;
        border-radius: 8px;
        padding: 12px;
        width: 100%;
        outline: none;
        transition: border-color 0.2s ease;
      }
      select:focus {
        border-color: #89b4fa;
      }
      label {
        font-size: 0.95rem;
        font-weight: 600;
        color: #bac2de;
      }
      .score-box {
        background-color: #181825;
        border: 1px solid #45475a;
        border-radius: 8px;
        padding: 24px;
        text-align: center;
      }
      .utility-result {
        font-size: 3.5rem;
        font-weight: 800;
        color: #f9e2af;
        line-height: 1;
        margin: 10px 0;
      }
      canvas {
        width: 100%;
        height: 300px;
        margin-top: 20px;
        background: #1e1e2e;
        border-radius: 8px;
        border: 1px solid #45475a;
      }

      /* Cross-browser Slider Styling */
      input[type="range"] {
        -webkit-appearance: none;
        -moz-appearance: none;
        appearance: none;
        background: transparent;
        margin-top: 10px;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        height: 20px;
        width: 20px;
        border-radius: 50%;
        background: #f9e2af;
        cursor: pointer;
        margin-top: -8px;
        box-shadow: 0 0 10px rgba(249, 226, 175, 0.5);
      }
      input[type="range"]::-webkit-slider-runnable-track {
        width: 100%;
        height: 6px;
        cursor: pointer;
        background: #45475a;
        border-radius: 4px;
      }
      input[type="range"]::-moz-range-thumb {
        height: 20px;
        width: 20px;
        border-radius: 50%;
        background: #f9e2af;
        cursor: pointer;
        border: none;
        box-shadow: 0 0 10px rgba(249, 226, 175, 0.5);
      }
      input[type="range"]::-moz-range-track {
        width: 100%;
        height: 6px;
        cursor: pointer;
        background: #45475a;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2
        class="text-2xl font-bold mb-6 text-center tracking-wide"
        style="color: #89b4fa"
      >
        Vodite Utility Curve Visualizer
      </h2>

      <div class="grid grid-cols-2 gap-4 mb-6">
        <div>
          <label for="segment">Target Segment</label>
          <select id="segment" onchange="updateUI()"></select>
        </div>
        <div>
          <label for="characteristic">Characteristic</label>
          <select id="characteristic" onchange="updateUI()"></select>
        </div>
      </div>

      <div class="mb-6">
        <div class="flex justify-between text-sm text-[#bac2de] font-bold">
          <span id="sliderMinLabel">Min</span>
          <span id="sliderValLabel" style="color: #f9e2af; font-size: 1.1rem"
            >Val</span
          >
          <span id="sliderMaxLabel">Max</span>
        </div>
        <input type="range" id="levelSlider" oninput="draw()" step="1" />
      </div>

      <div class="score-box mb-6">
        <div class="text-xs text-[#a6adc8] uppercase tracking-widest font-bold">
          Interpolated Utility Score
        </div>
        <div id="utilityResult" class="utility-result">0.00</div>
      </div>

      <canvas id="chartCanvas" width="800" height="400"></canvas>
    </div>

    <script>
      const data = {
        Innovators: {
          Price: [
            [449, 0.0],
            [601, 1.0],
            [753, 0.79],
            [905, 0.36],
          ],
          Resolution: [
            [61, 0.18],
            [74, 0.5],
            [87, 0.88],
            [100, 0.6],
          ],
          Energy: [
            [34, 0.53],
            [49, 0.55],
            [64, 0.55],
            [79, 0.53],
          ],
          Connectivity: [
            [7, 0.33],
            [8, 0.7],
            [9, 0.68],
            [10, 0.44],
          ],
        },
        "Early Adopters": {
          Price: [
            [386, 0.0],
            [538, 0.26],
            [690, 1.0],
            [842, 0.4],
          ],
          Resolution: [
            [56, 0.21],
            [69, 0.5],
            [82, 0.59],
            [95, 0.36],
          ],
          Energy: [
            [38, 0.46],
            [53, 0.46],
            [68, 0.41],
            [83, 0.34],
          ],
          Connectivity: [
            [7, 0.47],
            [8, 0.57],
            [9, 0.43],
            [10, 0.19],
          ],
        },
        Followers: {
          Price: [
            [315, 0.0],
            [467, 0.26],
            [619, 1.0],
            [771, 0.37],
          ],
          Resolution: [
            [41, 0.24],
            [54, 0.46],
            [67, 0.57],
            [80, 0.38],
          ],
          Energy: [
            [37, 0.45],
            [52, 0.45],
            [67, 0.4],
            [82, 0.33],
          ],
          Connectivity: [
            [5, 0.48],
            [6, 0.6],
            [7, 0.41],
            [8, 0.14],
          ],
        },
      };

      function init() {
        const segSelect = document.getElementById("segment");
        const charSelect = document.getElementById("characteristic");

        for (const seg in data) segSelect.add(new Option(seg, seg));
        for (const char in data["Innovators"])
          charSelect.add(new Option(char, char));

        updateUI();
      }

      function updateUI() {
        const seg = document.getElementById("segment").value;
        const char = document.getElementById("characteristic").value;
        const points = data[seg][char];

        const minX = points[0][0];
        const maxX = points[points.length - 1][0];

        const slider = document.getElementById("levelSlider");
        slider.min = minX;
        slider.max = maxX;
        // Keep current value if within range, else set to midpoint
        if (slider.value < minX || slider.value > maxX) {
          slider.value = Math.round((minX + maxX) / 2);
        }

        document.getElementById("sliderMinLabel").textContent = minX;
        document.getElementById("sliderMaxLabel").textContent = maxX;

        draw();
      }

      function draw() {
        const seg = document.getElementById("segment").value;
        const char = document.getElementById("characteristic").value;
        const points = data[seg][char];
        const targetX = parseFloat(
          document.getElementById("levelSlider").value,
        );

        document.getElementById("sliderValLabel").textContent =
          `${char}: ${targetX}`;

        // Calculate Interpolated Utility
        let targetY = 0;
        for (let i = 0; i < points.length - 1; i++) {
          if (targetX >= points[i][0] && targetX <= points[i + 1][0]) {
            const x1 = points[i][0],
              y1 = points[i][1];
            const x2 = points[i + 1][0],
              y2 = points[i + 1][1];
            targetY = y1 + ((targetX - x1) * (y2 - y1)) / (x2 - x1);
            break;
          }
        }
        document.getElementById("utilityResult").textContent =
          targetY.toFixed(3);

        // Draw Canvas
        const canvas = document.getElementById("chartCanvas");
        const ctx = canvas.getContext("2d");
        const W = canvas.width;
        const H = canvas.height;
        const pad = 40;

        ctx.clearRect(0, 0, W, H);

        const minX = points[0][0];
        const maxX = points[points.length - 1][0];

        const getX = (x) => pad + ((x - minX) / (maxX - minX)) * (W - pad * 2);
        const getY = (y) => H - pad - y * (H - pad * 2); // Y is 0 to 1 fixed

        // Grid lines
        ctx.strokeStyle = "#313244";
        ctx.lineWidth = 1;
        [0, 0.25, 0.5, 0.75, 1].forEach((y) => {
          ctx.beginPath();
          ctx.moveTo(pad, getY(y));
          ctx.lineTo(W - pad, getY(y));
          ctx.stroke();
          ctx.fillStyle = "#a6adc8";
          ctx.font = "12px sans-serif";
          ctx.fillText(y.toFixed(2), 5, getY(y) + 4);
        });

        // Draw Line
        ctx.strokeStyle = "#89b4fa";
        ctx.lineWidth = 3;
        ctx.beginPath();
        points.forEach((p, i) => {
          if (i === 0) ctx.moveTo(getX(p[0]), getY(p[1]));
          else ctx.lineTo(getX(p[0]), getY(p[1]));
        });
        ctx.stroke();

        // Draw Points
        ctx.fillStyle = "#1e1e2e";
        points.forEach((p) => {
          ctx.beginPath();
          ctx.arc(getX(p[0]), getY(p[1]), 5, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
        });

        // Draw Target Marker
        ctx.fillStyle = "#f9e2af";
        ctx.strokeStyle = "#1e1e2e";
        ctx.beginPath();
        ctx.arc(getX(targetX), getY(targetY), 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        // Target vertical dash line
        ctx.beginPath();
        ctx.setLineDash([5, 5]);
        ctx.moveTo(getX(targetX), getY(targetY));
        ctx.lineTo(getX(targetX), H - pad);
        ctx.strokeStyle = "#f9e2af";
        ctx.stroke();
        ctx.setLineDash([]);
      }

      window.onload = init;
    </script>
  </body>
</html>
